name: Heptagonal Topology Tests

on: [push]

# NEW: We must give the GitHub Action permission to push files back to the repo
permissions:
  contents: write
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    # ADD THIS SECTION:
    - name: Install dependencies
      run: |
         python -m pip install --upgrade pip
         pip install numpy scipy
      # THEN RUN YOUR TESTS:
    - name: Run SU(3) Matrix Isolation Test
      run: python tests/test_su3.py

    - name: Run U(1) Photon Translation Test
      run: python tests/test_u1.py
      
    - name: Run Condensation Collapse Test
      run: python tests/test_condensation.py

    - name: Run Frequency Sweep
      run: python tests/test_frequency_sweep.py

    - name: Run Autonomous Load Simulation
      run: python computational_model/simulation_loop.py

    - name: Run Resonance Discovery
      run: python tests/test_find_resonance.py

#    - name: Run Autonomous Load Simulation
#      run: python computational_model/simulation_loop.py

    - name: Upload Simulation Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Technomouse-Simulation-Results
        path: computational_model/Technomouse/Logs/
        retention-days: 7

    # NEW: Tell the bot to commit the newly generated files and push them
    - name: Save Logs to Repository
      run: |
        git config --local user.name "github-actions[bot]"
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git add computational_model/Technomouse/

        git commit -m "Save simulation logs from automated test [skip ci]" || echo "No new logs to save"
        git push
        
