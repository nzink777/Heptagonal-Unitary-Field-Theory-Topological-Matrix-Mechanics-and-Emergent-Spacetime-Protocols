name: Heptagonal Topology Tests

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

# NEW: We must give the GitHub Action permission to push files back to the repo
permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install numpy

    - name: Run SU(3) Matrix Isolation Test
      run: python tests/test_su3.py

    # NEW: Tell the bot to commit the newly generated files and push them
    - name: Save Logs to Repository
      run: |
        git config --local user.name "github-actions[bot]"
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git add -A
        git commit -m "Save simulation logs from automated test [skip ci]" || echo "No new logs to save"
        git push
        
