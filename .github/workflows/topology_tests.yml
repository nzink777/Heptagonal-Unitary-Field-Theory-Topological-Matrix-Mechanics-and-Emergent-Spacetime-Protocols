name: Heptagonal Topology Tests

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows you to trigger it manually from your phone

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install numpy

    - name: Run SU(3) Matrix Isolation Test
      run: python tests/test_su3.py
      
